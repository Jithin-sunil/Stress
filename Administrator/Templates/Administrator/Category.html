<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category</title>
</head>
<body>
    <h1 align="center">Category</h1>
<form action="" method="post">
     {% csrf_token %}
    <table border="20" align="center">
         <tr>
            <td>Category Name</td>
            <td><input type="text" name="txt1" id="" value="{{editdata.category_name}}" required placeholder="Enter Category Name"></td>
        </tr>
        <tr>
            <td colspan="2" align="center"><input type="submit" value="submit">
            <input type="submit" value="cancel"></td>
            
        </tr>
    </table>
</form>  
<table colspan="2" border="5" align="center">
    <tr>
        <td>SNo</td>
        <td>Category</td>
        <td>Action</td>
    </tr>
    {% for i in categorydata %}
    <tr>
        <td>{{forloop.counter}}</td>
        <td>{{i.category_name}}</td>
        <td><a href="{% url 'Administrator:delcategory' i.id %}">Delete</a>
        <a href="{% url 'Administrator:editcategory' i.id %}">Edit</a></td>
    </tr>
    {% endfor %}
</table>
</body>
</html>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Administrator:Category' %}"
</script>
{% endif %}

{% extends 'User/Head.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type</title>
</head>
<body>
    <h1 align="center">Type</h1>
    <form action="" method="post">
         {% csrf_token %}
        <table border="10" align="center" cellpadding="10">
           <tr>
            <td>Type</td>
            <td><input type="text" name="txt_type" id="" value="{{editdata.type_name}}" required placeholder="Enter the type"></td>
           </tr>
           <tr>
            <td colspan="2" align="center"><input type="submit" value="submit"></td>
           </tr>
        </table>
    </form>
    <table border="10" colspan="2" align="center">
        <tr>
            <td>SNo</td>
            <td>Type</td>
            <td>Action</td>
        </tr>
         {% for i in typedata %}
        <tr>
            <td>{{forloop.counter}}</td>
            <td>{{i.type_name}}</td>
            <td><a href="{% url 'Administrator:deltype' i.id %}">Delete</a>
            <a href="{% url 'Administrator:edittype' i.id %}">Edit</a></td>
        </tr>
       {% endfor %}  
    </table>
</body>
</html>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Administrator:Type' %}"
</script>
{% endif %}
{% endblock content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand</title>
</head>
<body>
    <h1 align="center">Brand</h1>
    <form action="" method="post">
         {% csrf_token %}
        <table border="10" align="center">
           <tr>
            <td>Brand</td>
            <td><input type="text" name="txt_brand" id="" value="{{editdata.brand_name}}" required placeholder="Enter Brand Name" ></td>
           </tr>
           <tr>
            <td colspan="2" align="center"><input type="submit" value="submit"></td>
           </tr>
        </table>
    </form>
    <table border="10" colspan="2" align="center">
        <tr>
            <td>SNo</td>
            <td>Brand</td>
            <td>Action</td>
        </tr>
         {% for i in branddata %}
        <tr>
            <td>{{forloop.counter}}</td>
            <td>{{i.brand_name}}</td>
            <td><a href="{% url 'Administrator:delbrand' i.id %}">Delete</a>
            <a href="{% url 'Administrator:editbrand' i.id %}">Edit</a></td>
        </tr>
       {% endfor %}  
    </table>
</body>
</html>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Administrator:Brand' %}"
</script>
{% endif %}

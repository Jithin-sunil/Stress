<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubCategory</title>
</head>
<body>
    <h1 align="center">Sub Category</h1>
<form action="" method="post">
     {% csrf_token %}
    <table border="20" align="center" cellpadding="10">
         <tr>
            <td>Category Name</td>
            <td><select name="category" id="" valu="{{editdata.category}}" required>
             <option>--select--</option>
             {% for i in categories %}
             <option {% if editdata.category.id == i.id %} selected {% endif %} value="{{i.id}}">{{i.category_name}}</option>
             {% endfor %}
            </select></td>
        </tr>
        
        <tr>
            <td>SubCategory Name</td>
            <td><input type="text" name="txt_sname" id="" value="{{editdata.subcategory_name}}" required placeholder="Enter The SubCategory"></td>
            </tr>
            <td colspan="2" align="center"><input type="submit" value="submit">
            <input type="reset" value="cancel"></td>
            
        </tr>
    </table>
</form>  
<table border="10" align="center">
<tr>
    <td>SNo</td>
    <td>Category</td>
    <td>SubCategory</td>
    <td>Action</td>
</tr>
{% for i in subcategories %}
<tr>
    <td>{{forloop.counter}}</td>
    <td>{{i.category.category_name}}</td>
    <td>{{i.subcategory_name}}</td>
    <td><a href="{% url 'Administrator:delsubcategory' i.id %}">Delete</a>
        <a href="{% url 'Administrator:editsubcategory' i.id %}">Edit</a></td>
</tr>
{% endfor %}
</table>
</body>
</html>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Administrator:SubCategory' %}"
</script>
{% endif %}

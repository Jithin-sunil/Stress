{% extends 'Administrator/Head.html' %}
{% load static %}
{% block content %}

<style>

body{
    background:#ece9fb;
    font-family:Arial,sans-serif;
    padding:40px 0;
}

.reply-card{
    max-width:700px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:20px;
    border-top:6px solid #6f42c1;
    box-shadow:0 6px 15px rgba(0,0,0,.08);
}

.page-title{
    text-align:center;
    color:#6f42c1;
    margin-bottom:25px;
}

.reply-table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 18px;
}

.reply-table td:first-child{
    width:140px;
    font-weight:bold;
    color:#555;
}

.reply-table textarea{
    width:100%;
    height:140px;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    resize:none;
    outline:none;
    font-size:15px;
}

.reply-table textarea:focus{
    border-color:#6f42c1;
}

.submit-btn{
    background:#6f42c1;
    color:white;
    border:none;
    padding:12px 28px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.submit-btn:hover{
    background:#5b35a5;
}

</style>


<div class="reply-card">

<h1 class="page-title">REPLY</h1>

<form action="" method="post">

{% csrf_token %}

<table class="reply-table">

<tr>

<td>Reply</td>

<td>

<textarea
name="txt_reply"
required
placeholder="Enter your reply">

</textarea>

</td>

</tr>


<tr>

<td colspan="2" align="center">

<input type="submit"
value="Submit"
class="submit-btn">

</td>

</tr>

</table>

</form>

</div>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'Administrator:ViewComplaint' %}"
</script>
{% endif %}
{% endblock content %}

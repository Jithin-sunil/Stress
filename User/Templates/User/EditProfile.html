{% extends 'User/Head.html' %}
{% block content %}

<style>

body{
    background:#f2f4f7;
    font-family:Arial,sans-serif;
    padding:40px 0;
}

.profile-card{
    max-width:750px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 4px 20px rgba(0,0,0,.06);
}

.page-title{
    text-align:center;
    color:#435ebe;
    font-size:32px;
    margin-bottom:30px;
    font-weight:600;
}

.profile-table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 20px;
}

.profile-table td:first-child{
    width:180px;
    color:#25396f;
    font-weight:600;
}

.profile-table input{
    width:100%;
    padding:14px;
    border:1px solid #dce7f1;
    border-radius:10px;
    background:#fafbff;
    outline:none;
    font-size:15px;
    transition:.3s;
}

.profile-table input:focus{
    border-color:#435ebe;
    box-shadow:0 0 0 3px rgba(67,94,190,.15);
}

.btn-area{
    text-align:center;
    padding-top:15px;
}

.update-btn{
    background:#435ebe;
    color:white;
    border:none;
    padding:12px 28px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    margin-right:10px;
}

.cancel-btn{
    background:#e9ecef;
    color:#495057;
    border:none;
    padding:12px 28px;
    border-radius:8px;
    cursor:pointer;
}

.update-btn:hover{
    background:#364b98;
}

.cancel-btn:hover{
    background:#dfe3e6;
}

</style>



<div class="profile-card">

<h1 class="page-title">

Edit Profile

</h1>

<form action="" method="post">

{% csrf_token %}

<table class="profile-table">

<tr>

<td>User Name</td>

<td>

<input type="text"

name="txt_name"

value="{{userdata.user_name}}"

required

placeholder="Enter User Name"

minlength="3"

pattern="^[A-Z]+[a-zA-Z ]*$"

title="Name Allows Only Alphabets, Spaces and First Letter Must Be Capital">

</td>

</tr>


<tr>

<td>Contact</td>

<td>

<input type="text"

name="txt_contact"

value="{{userdata.user_contact}}"

minlength="10"

maxlength="10"

pattern="[6-9]{1}[0-9]{9}"

title="Phone number must start with 6-9"

required>

</td>

</tr>


<tr>

<td>Email</td>

<td>

<input type="email"

name="txt_email"

value="{{userdata.user_email}}"

required>

</td>

</tr>


<tr>

<td>Address</td>

<td>

<input type="text"

name="txt_address"

value="{{userdata.user_address}}"

required>

</td>

</tr>


</table>


<div class="btn-area">

<input type="submit"

value="Update"

class="update-btn">

<input type="reset"

value="Cancel"

class="cancel-btn">

</div>

</form>

</div>


{% if msg %}
<script>
alert("{{msg}}")
window.location="{% url 'User:EditProfile' %}"
</script>
{% endif %}

{% endblock content %}

{% extends 'User/Head.html' %}
{% load static %}
{% block content %}

<style>

body{
    background: linear-gradient(135deg,#e8c6f0,#f8edeb); /* pale pink */
}

/* container */
.bbbbox{
    width:80%;
    margin:auto;
    margin-top:60px;
}

/* card */
.card{
    background:white;
    border-radius:12px;
    padding:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* heading */
h2{
    text-align:center;
    margin-bottom:20px;
    color:#000; /* black text */
    font-weight:600;
}

/* table */
table{
    width:100%;
    border-collapse:collapse;
}

/* header */
table th{
    background:#6f42c1; /* soft pink header */
    color:#000; /* black text */
    padding:12px;
}

/* cells */
table td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #eee;
    color:#000; /* black text */
}

/* hover effect */
tr:hover{
    background:#fff0f3; /* very light pink hover */
}

</style>

<body>

<div class="container">
<div class="card">

<h2>Your Stress Test Results</h2>

<table>
<tr>
    <th>Sl No</th>
    <th>Total Score</th>
    <th>Stress Level</th>
    <th>Date</th>
</tr>

{% for i in data %}
<tr>
    <td>{{forloop.counter}}</td>
    <td>{{i.total_score}}</td>
    <td>{{i.stress_level}}</td>
    <td>{{i.date}}</td>
</tr>
{% empty %}
<tr>
<td colspan="4">No Stress Results Found</td>
</tr>
{% endfor %}

</table>

</div>
</div>

</body>
</html>

{% endblock content %}

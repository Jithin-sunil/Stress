{% extends 'User/Head.html' %}
{% block content %}

<style>

body{
    background:#f2f4f7;
    font-family:Arial,sans-serif;
    padding:40px 0;
}

.payment-card{

max-width:700px;

margin:auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:
0 4px 20px rgba(0,0,0,.06);
}

.page-title{

text-align:center;

color:#435ebe;

font-size:32px;

font-weight:600;

margin-bottom:30px;
}

.payment-table{

width:100%;

border-collapse:separate;

border-spacing:0 18px;
}

.payment-table td:first-child{

width:200px;

font-weight:600;

color:#25396f;
}

.payment-table input{

width:100%;

padding:14px;

border:1px solid #dce7f1;

border-radius:10px;

background:#fafbff;

outline:none;

font-size:15px;

transition:.3s;
}

.payment-table input:focus{

border-color:#435ebe;

box-shadow:
0 0 0 3px rgba(67,94,190,.15);
}

.amount-box{

background:#eef3ff;

padding:14px;

border-radius:10px;

color:#435ebe;

font-weight:700;

text-align:center;
}

.pay-btn{

background:#435ebe;

color:white;

border:none;

padding:12px 28px;

border-radius:8px;

cursor:pointer;

font-size:15px;
}

.pay-btn:hover{

background:#364b98;
}

</style>



<div class="payment-card">

<h1 class="page-title">

Payment

</h1>

<form action="" method="post">

{% csrf_token %}

<table class="payment-table">

<tr>

<td>Card Owner Name</td>

<td>

<input type="text"

name="txt_name"

required

placeholder="Enter Your Name"

minlength="3"

pattern="^[A-Z]+[a-zA-Z ]*$"

title="Name Allows Only Alphabets and Spaces">

</td>

</tr>


<tr>

<td>Card Number</td>

<td>

<input type="text"

name="txt_no"

required

pattern="[0-9]{13,19}"

maxlength="16"

placeholder="Enter Card Number"

title="Card number must be 13–19 digits">

</td>

</tr>


<tr>

<td>CVV</td>

<td>

<input type="password"

name="txt_cvv"

pattern="[0-9]{3,4}"

maxlength="4"

placeholder="Enter CVV"

title="CVV must contain 3 or 4 digits"

required>

</td>

</tr>


<tr>

<td>Expiry Date</td>

<td>

<input type="date"

name="date"

required>

</td>

</tr>


<tr>

<td>Amount</td>

<td>

<div class="amount-box">

₹ {{bookingdata.booking_amount}}

</div>

</td>

</tr>


<tr>

<td colspan="2" align="center">

<input type="submit"

value="Pay Now"

class="pay-btn">

</td>

</tr>

</table>

</form>

</div>


{% if msg %}
<script>

alert("{{msg}}");

window.location=
"{% url 'User:MyBooking' %}"

</script>
{% endif %}

{% endblock content %}

{% extends 'User/Head.html' %}
{% block content %}

<style>

body{
    background:#f2f4f7;
    font-family:Arial,sans-serif;
    padding:40px 0;
}

.password-card{
    max-width:700px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 4px 20px rgba(0,0,0,.06);
}

.page-title{
    text-align:center;
    color:#435ebe;
    font-size:32px;
    margin-bottom:30px;
    font-weight:600;
}

.password-table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 20px;
}

.password-table td:first-child{
    width:180px;
    color:#25396f;
    font-weight:600;
}

.password-table input{
    width:100%;
    padding:14px;
    border:1px solid #dce7f1;
    border-radius:10px;
    outline:none;
    background:#fafbff;
    font-size:15px;

    transition:.3s;
}

.password-table input:focus{
    border-color:#435ebe;
    box-shadow:0 0 0 3px rgba(67,94,190,.15);
}

.btn-area{
    text-align:center;
    padding-top:15px;
}

.update-btn{
    background:#435ebe;
    color:white;
    border:none;
    padding:12px 28px;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    margin-right:10px;
}

.cancel-btn{
    background:#e9ecef;
    color:#495057;
    border:none;
    padding:12px 28px;
    border-radius:8px;
    cursor:pointer;
}

.update-btn:hover{
    background:#364b98;
}

.cancel-btn:hover{
    background:#dfe3e6;
}

</style>


<div class="password-card">

<h1 class="page-title">

Change Password

</h1>

<form action="" method="post">

{% csrf_token %}

<table class="password-table">

<tr>

<td>Old Password</td>

<td>

<input type="password"

name="o_password"

required>

</td>

</tr>


<tr>

<td>New Password</td>

<td>

<input type="password"

name="n_password"

pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"

title="Must contain at least one number and uppercase and lowercase letter"

required>

</td>

</tr>


<tr>

<td>Confirm Password</td>

<td>

<input type="password"

name="c_password"

pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"

title="Must contain at least one number and uppercase and lowercase letter"

required>

</td>

</tr>

</table>


<div class="btn-area">

<input type="submit"

value="Update"

class="update-btn">

<input type="reset"

value="Cancel"

class="cancel-btn">

</div>

</form>

</div>


{% if msg %}
<script>
alert("{{msg}}")
window.location="{% url 'User:ChangePassword' %}"
</script>
{% endif %}

{% endblock content %}

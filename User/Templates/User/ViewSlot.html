{% extends 'User/Head.html' %}
{% block content %}

<style>

body{
    background:#f2f4f7;
    font-family:Arial,sans-serif;
    padding:40px 0;
}

.slot-card{

max-width:750px;

margin:auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:
0 4px 20px rgba(0,0,0,.06);
}

.page-title{

text-align:center;

color:#435ebe;

font-size:32px;

font-weight:600;

margin-bottom:30px;
}

.slot-table{

width:100%;

border-collapse:separate;

border-spacing:0 18px;
}

.slot-table td:first-child{

width:170px;

font-weight:600;

color:#25396f;
}

.slot-table input,
.slot-table select,
.slot-table textarea{

width:100%;

padding:14px;

border:1px solid #dce7f1;

border-radius:10px;

background:#fafbff;

outline:none;

font-size:15px;

transition:.3s;
}

.slot-table input:focus,
.slot-table select:focus,
.slot-table textarea:focus{

border-color:#435ebe;

box-shadow:
0 0 0 3px rgba(67,94,190,.15);
}

.slot-table textarea{

height:120px;

resize:none;
}

.submit-btn{

background:#435ebe;

color:white;

border:none;

padding:12px 28px;

border-radius:8px;

cursor:pointer;

font-size:15px;
}

.submit-btn:hover{

background:#364b98;
}

</style>



<div class="slot-card">

<h1 class="page-title">

View Slot

</h1>

<form action="" method="post">

{% csrf_token %}

<table class="slot-table">

<tr>

<td>Date</td>

<td>

<input type="date"

name="sel_date"

id="sel_date"

required>

</td>

</tr>


<tr>

<td>Time Slot</td>

<td>

<select name="sel_time"

id="sel_time"

required>

<option value="">

Select Time

</option>

{% for i in slot %}

<option value="{{i.id}}">

{{i.slot_fromtime}}

-

{{i.slot_totime}}

</option>

{% endfor %}

</select>

</td>

</tr>


<tr>

<td>Description</td>

<td>

<textarea

name="txt_description"

placeholder="Enter description"

required>

</textarea>

</td>

</tr>


<tr>

<td colspan="2"

align="center">

<input type="submit"

value="Book Slot"

class="submit-btn">

</td>

</tr>

</table>

</form>

</div>



<script src=
"https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js">
</script>

<script>

$("#sel_date").change(function(){

var did=$(this).val();

var pid={{pid}};

$.ajax({

url:"{% url 'User:Ajaxdate' %}",

data:{
did:did,
pid:pid
},

success:function(data){

$("#sel_time").html(data);

}

});

});

</script>



{% if msg %}
<script>

alert("{{msg}}")

window.location=
"{% url 'User:ViewPsychologist' %}"

</script>
{% endif %}

{% endblock content %}

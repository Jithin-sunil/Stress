<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LargestSmallest</title>
</head>
<body>
    <h1 align="center">LargestSmallest</h1>
   <form action="" method="post">
    {% csrf_token %}
    <table border="20" align="center">
         <tr>
            <td>Number 1</td>
            <td><input type="text" name="txt_num1" id="" value="{{num1}}"></td>
        </tr>
        <tr>
            <td>Number 2</td>
            <td><input type="text" name="txt_num2" id="" value="{{num2}}"></td>
        </tr>
        <tr>
            <td>Number 3</td>
            <td><input type="text" name="txt_num3" id="" value="{{num3}}"></td>
        </tr>
        <tr>
            <td colspan="2" align="center"><input type="submit" value="submit"></td>
           
        </tr>
        <tr>
            <td>Largest</td>
            <td>{{largest}}</td>
         </tr>
         <tr>
            <td>Smallest</td>
            <td>{{smallest}}</td>
        </tr>
    </table>
   </form>
</body>
</html>

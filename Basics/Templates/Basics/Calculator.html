<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
<h1 align="center">Calculator</h1>
 <form action="" method="post">
   {% csrf_token %}
    <table border="20" align="center">
    <tr>
        <td>Number 1</td>
        <td><input type="text" name="txt_num1" id="" name="{{num1}}"></td>
    </tr>
    <tr>
        <td>Number 2</td>
        <td><input type="text" name="txt_num2" id="" name="{{num2}}"></td>
    </tr>
    <tr>
        <td colspan="2">
            <input type="submit" value="Add" name="btn">
            <input type="submit" value="Subtract" name="btn">
            <input type="submit" value="Product" name="btn">
            <input type="submit" value="Divide" name="btn"></td>
    
    </tr>
    <tr>
        <td>Result1:</td>
        <td>{{result}}</td>
    </tr>
    </table>
 </form>   
</body>
</html>

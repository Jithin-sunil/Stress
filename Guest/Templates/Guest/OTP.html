{% extends 'Guest/Head.html' %}
{% block content %}

<style>

body{
    background:#f4f8fb;
    font-family:Arial,sans-serif;
}

.page-section{
    padding:60px 20px;
    min-height:100vh;
}

.form-card{
    max-width:900px;
    margin:auto;
    background:white;
    padding:60px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.form-title{
    text-align:center;
    font-size:52px;
    font-weight:700;
    color:#0d6efd;
    margin-bottom:60px;
}

.form-row{
    display:flex;
    align-items:center;
    margin-bottom:35px;
}

.form-row label{
    width:220px;
    font-size:18px;
    font-weight:600;
    color:#1d3557;
}

.form-control{
    flex:1;
    padding:18px;
    border:1px solid #d8e2ef;
    border-radius:14px;
    outline:none;
    font-size:16px;
}

.form-control:focus{
    border-color:#0d6efd;
    box-shadow:0 0 10px rgba(13,110,253,.15);
}

.btn-area{
    text-align:center;
    margin-top:40px;
}

.submit-btn{
    background:#0d6efd;
    color:white;
    border:none;
    padding:15px 45px;
    border-radius:14px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
}

.submit-btn:hover{
    background:#0b5ed7;
}

</style>



<div class="page-section">

<div class="form-card">

<h1 class="form-title">
Verify OTP
</h1>

<form action="" method="post">

{% csrf_token %}

<div class="form-row">

<label>OTP</label>

<input type="text"
name="txt_otp"
class="form-control"
placeholder="Enter OTP"
required>

</div>

<div class="btn-area">

<input type="submit"
value="Verify"
class="submit-btn">

</div>

</form>

</div>

</div>

{% endblock content %}

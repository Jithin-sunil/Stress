{% extends 'Guest/Head.html' %}
{% block content %}

<style>
    .register-section {
        min-height: 100vh;
        background: #f4f8fb;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 0;
    }

    .register-card {
        background: #fff;
        width: 650px;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
    }

    .register-title {
        text-align: center;
        color: #0d6efd;
        font-size: 34px;
        font-weight: 700;
    }

    .register-subtitle {
        text-align: center;
        color: gray;
        margin-bottom: 30px;
    }

    .form-group {
        margin-bottom: 18px;

    }

    label {
        font-weight: 600;
        margin-bottom: 8px;
        display: block;
    }

    input,
    textarea,
    select {

        width: 100%;
        padding: 12px;

        border: 1px solid #ddd;

        border-radius: 10px;

        outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {

        border-color: #0d6efd;

        box-shadow:
            0 0 8px rgba(13, 110, 253, .2);
    }

    .gender-box {
        display: flex;
        gap: 20px;
        accent-color: #0d6efd;
    }

    .btn-box {
        display: flex;
        gap: 10px;
        margin-top: 25px;
    }

    .submit-btn {

        flex: 1;

        background: #0d6efd;

        color: white;

        padding: 12px;

        border: none;

        border-radius: 10px;

        font-weight: 600;
    }

    .reset-btn {

        flex: 1;

        background: #dee2e6;

        padding: 12px;

        border: none;

        border-radius: 10px;
    }

    .submit-btn:hover {
        background: #0b5ed7;
    }
</style>



<div class="register-section">

    <div class="register-card">

        <h2 class="register-title">
            Create Account
        </h2>

        <p class="register-subtitle">
            Join Mindlytics for mental wellness support
        </p>


        <form action="" method="post" enctype="multipart/form-data">

            {% csrf_token %}


            <div class="form-group">
                <label>Name</label>

                <input type="text" name="txt_name" placeholder="Enter name" pattern="^[A-Z]+[a-zA-Z ]*$" required>
            </div>



            <div class="form-group">

                <label>Contact</label>

                <input type="text" name="txt_contact" pattern="[6-9]{1}[0-9]{9}" required>

            </div>



            <div class="form-group">

                <label>Email</label>

                <input type="email" name="txt_email" required>

            </div>



            <div class="form-group">

                <label>Password</label>

                <input type="password" name="txt_password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" required>

            </div>



            <div class="form-group">

                <label>Confirm Password</label>

                <input type="password" name="txt_confirmpassword" required>

            </div>



            <div class="form-group">

                <label>Gender</label>

                <div class="gender-box">

                    <label>
                        <input type="radio" name="gender" value="Male"> Male
                    </label>

                    <label>
                        <input type="radio" name="gender" value="Female"> Female
                    </label>

                </div>

            </div>



            <div class="form-group">

                <label>Date of Birth</label>

                <input type="date" name="txt_dob" id="txt_dob" required >

            </div>



            <div class="form-group">

                <label>Address</label>

                <textarea name="txt_address" rows="3"></textarea>

            </div>



            <div class="form-group">

                <label>District</label>

                <select name="sel_district" id="sel_district">

                    <option>Select District</option>

                    {% for i in districts %}

                    <option value="{{i.id}}">
                        {{i.district_name}}
                    </option>

                    {% endfor %}

                </select>

            </div>



            <div class="form-group">

                <label>Place</label>

                <select name="sel_place" id="sel_place">

                    <option>Select Place</option>

                </select>

            </div>



            <div class="form-group">

                <label>Photo</label>

                <input type="file" name="photo">

            </div>



            <div class="form-group">

                <label>Proof</label>

                <input type="file" name="proof">

            </div>



            <div class="btn-box">

                <button type="submit" class="submit-btn">

                    Register

                </button>


                <button type="reset" class="reset-btn">

                    Cancel

                </button>

            </div>

        </form>

    </div>

</div>



<script>
  const dateInput = document.getElementById("txt_dob");
  const today = new Date();
  const maxDate = new Date(
    today.getFullYear() - 15,
    today.getMonth(),
    today.getDate()
  );

  const formattedDate = maxDate.toISOString().split("T")[0];
  dateInput.max = formattedDate;
</script>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js">
</script>


<script>

    $("#sel_district").change(function () {

        var did = $(this).val();

        $.ajax({

            url: "{% url 'Guest:Ajaxplace' %}",

            data: { did: did },

            success: function (data) {

                $("#sel_place").html(data);

            }

        });

    });

</script>


{% if msg %}
<script>

    alert("{{msg}}");

    window.location =
        "{% url 'Guest:NewUser' %}"

</script>
{% endif %}

{% endblock %}

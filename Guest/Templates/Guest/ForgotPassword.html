{% extends 'Guest/Head.html' %}
{% block content %}

<style>

body{
    background:#f4f8fb;
    font-family:Arial,sans-serif;
}

.page-section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

/* card */

.form-card{
    width:850px;
    background:white;
    padding:70px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.form-title{
    text-align:center;
    font-size:50px;
    font-weight:700;
    color:#0d6efd;
    margin-bottom:70px;
}

/* input row */

.form-group{
    display:flex;
    align-items:center;
    margin-bottom:35px;
}

.form-group label{
    width:220px;
    font-size:20px;
    font-weight:600;
    color:#1d3557;
}

.form-control{
    flex:1;
    padding:18px;
    border:1px solid #d8e2ef;
    border-radius:14px;
    outline:none;
    font-size:16px;
}

.form-control:focus{
    border-color:#0d6efd;
    box-shadow:0 0 10px rgba(13,110,253,.15);
}

/* buttons */

.button-group{
    text-align:center;
    margin-top:50px;
}

.submit-btn{
    background:#0d6efd;
    color:white;
    border:none;
    padding:15px 40px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin-right:15px;
}

.submit-btn:hover{
    background:#0b5ed7;
}

.cancel-btn{
    background:#d9dde2;
    color:#333;
    border:none;
    padding:15px 35px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

</style>



<div class="page-section">

<div class="form-card">

<form action="" method="post">

{% csrf_token %}

<h1 class="form-title">
Forgot Password
</h1>


<div class="form-group">

<label>Email Address</label>

<input type="email"
name="txt_email"
class="form-control"
placeholder="Enter your email"
required>

</div>


<div class="button-group">

<input type="submit"
value="Send"
class="submit-btn">

<input type="reset"
value="Cancel"
class="cancel-btn">

</div>

</form>

</div>

</div>

{% endblock content %}

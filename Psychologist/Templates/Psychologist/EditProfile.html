{% extends 'Psychologist/Head.html' %}
{% block content %}

<style>

body{
    background:#edf1f5;
    font-family:Arial,sans-serif;
    padding:40px 0;
}

.profile-card{
    max-width:700px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.page-title{
    text-align:center;
    color:#1e66f5;
    font-size:35px;
    margin-bottom:25px;
}

.profile-table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 15px;
}

.profile-table td:first-child{
    width:180px;
    font-weight:bold;
    color:#333;
}

.profile-table input{
    width:100%;
    padding:12px;
    border:none;
    background:#f5f7fb;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

.profile-table input:focus{
    border:2px solid #1e66f5;
}

.btn-area{
    text-align:center;
    padding-top:20px;
}

.update-btn{
    background:#1e66f5;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    margin-right:10px;
}

.cancel-btn{
    background:#e5e7eb;
    color:#333;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
}

.update-btn:hover{
    background:#1456d9;
}

.cancel-btn:hover{
    background:#d1d5db;
}

</style>

<div class="profile-card">

<h2 class="page-title">Edit Profile</h2>

<form action="" method="post">
{% csrf_token %}

<table class="profile-table">

<tr>
<td>User Name</td>

<td>
<input type="text"
name="txt_name"
value="{{psychologistdata.psychologist_name}}"
required
placeholder="Enter Your Username"
minlength="3"
pattern="^[A-Z]+[a-zA-Z ]*$"
title="Name Allows Only Alphabets, Spaces and First Letter Must Be Capital Letter">
</td>

</tr>

<tr>
<td>Contact</td>

<td>
<input type="text"
name="txt_contact"
value="{{psychologistdata.psychologist_contact}}"
minlength="10"
maxlength="10"
required
pattern="[6-9]{1}[0-9]{9}"
title="Phone number with 6-9 and remaining 9 digits">
</td>

</tr>

<tr>
<td>Email</td>

<td>
<input type="email"
name="txt_email"
value="{{psychologistdata.psychologist_email}}"
required>
</td>

</tr>

<tr>
<td>Address</td>

<td>
<input type="text"
name="txt_address"
value="{{psychologistdata.psychologist_address}}"
required>
</td>

</tr>

</table>

<div class="btn-area">

<input type="submit"
value="Update"
class="update-btn">

<input type="reset"
value="Cancel"
class="cancel-btn">

</div>

</form>

</div>

{% if msg %}
<script>
alert("{{msg}}")
window.location="{% url 'Psychologist:MyProfile' %}"
</script>
{% endif %}

{% endblock content %}

{% extends 'Psychologist/Head.html' %}
{% block content %}

<style>

body{
    background:#edf1f5;
    font-family:Arial,sans-serif;
    padding:40px 0;
}

.fee-card{
    max-width:550px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.page-title{
    text-align:center;
    color:#1e66f5;
    font-size:35px;
    margin-bottom:25px;
}

.fee-table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 20px;
}

.fee-table td:first-child{
    width:140px;
    font-weight:bold;
    color:#333;
}

.fee-table input[type="text"]{
    width:100%;
    padding:12px;
    border:none;
    background:#f5f7fb;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

.fee-table input[type="text"]:focus{
    border:2px solid #1e66f5;
}

.submit-btn{
    background:#1e66f5;
    color:white;
    border:none;
    padding:12px 28px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
}

.submit-btn:hover{
    background:#1456d9;
}

</style>

<div class="fee-card">

<h1 class="page-title">Fee</h1>

<form action="" method="post">

{% csrf_token %}

<table class="fee-table">

<tr>
<td>Amount</td>

<td>
<input type="text"
name="txt_amount"
placeholder="Enter the amount"
required>
</td>

</tr>

<tr>
<td colspan="2" align="center">

<input type="submit"
value="Submit"
class="submit-btn">

</td>
</tr>

</table>

</form>

</div>

{% if msg %}
<script>
alert("{{msg}}")
window.location="{% url 'Psychologist:ViewBooking' %}"
</script>
{% endif %}

{% endblock content %}

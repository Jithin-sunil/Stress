{% extends 'Psychologist/Head.html' %}
{% block content %}

<style>

body{
    background:#edf1f5;
    font-family:Arial,sans-serif;
    padding:40px 0;
}

.password-card{
    max-width:650px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.page-title{
    text-align:center;
    color:#1e66f5;
    font-size:35px;
    margin-bottom:25px;
}

.password-table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 18px;
}

.password-table td:first-child{
    width:180px;
    font-weight:bold;
    color:#333;
}

.password-table input{
    width:100%;
    padding:12px;
    border:none;
    background:#f5f7fb;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

.password-table input:focus{
    border:2px solid #1e66f5;
}

.btn-area{
    text-align:center;
    padding-top:15px;
}

.update-btn{
    background:#1e66f5;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    margin-right:10px;
    font-size:15px;
}

.cancel-btn{
    background:#e5e7eb;
    color:#333;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
}

.update-btn:hover{
    background:#1456d9;
}

.cancel-btn:hover{
    background:#d1d5db;
}

</style>

<div class="password-card">

<h1 class="page-title">Change Password</h1>

<form action="" method="post">

{% csrf_token %}

<table class="password-table">

<tr>
<td>Old Password</td>

<td>
<input type="password"
name="o_password"
required>
</td>

</tr>

<tr>
<td>New Password</td>

<td>
<input type="password"
name="n_password"

pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"

title="Must contain at least one number, one uppercase, one lowercase letter and minimum 8 characters"

required>
</td>

</tr>

<tr>
<td>Confirm Password</td>

<td>
<input type="password"
name="c_password"

pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"

title="Must contain at least one number, one uppercase, one lowercase letter and minimum 8 characters"

required>
</td>

</tr>

</table>

<div class="btn-area">

<input type="submit"
value="Update"
class="update-btn">

<input type="reset"
value="Cancel"
class="cancel-btn">

</div>

</form>

</div>

{% if msg %}
<script>
alert("{{msg}}")
window.location="{% url 'Psychologist:MyProfile' %}"
</script>
{% endif %}

{% endblock content %}
